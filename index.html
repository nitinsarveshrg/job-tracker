<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Nitin</title>
<style>
:root{--blue:#1F4E79;--accent:#2E75B6;--dark:#1A1A2E;--border:#e2e8f0;--bg:#f8fafc;--card:#fff;--row:#f1f5f9;--muted:#64748b;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dark);font-size:14px;}
.topbar{background:var(--blue);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:-.01em;}
.topbar span{font-size:12px;opacity:.65;}
.page{max-width:1500px;margin:0 auto;padding:22px 24px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px;}
.stat-val{font-size:24px;font-weight:700;color:var(--blue);}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.toolbar input,.toolbar select{font-size:13px;padding:7px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--dark);outline:none;font-family:inherit;}
.toolbar input[type=text]{flex:1;min-width:160px;}
.btn{font-size:13px;padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--dark);cursor:pointer;font-weight:500;font-family:inherit;transition:all .15s;}
.btn:hover{background:var(--row);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--blue);border-color:var(--blue);}
.btn-sm{padding:4px 10px;font-size:12px;}
.wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:1200px;}
th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;background:var(--row);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8faff;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.b-saved{background:#f1f5f9;color:#475569;} .b-applied{background:#dbeafe;color:#1e40af;}
.b-interview{background:#dcfce7;color:#166534;} .b-offer{background:#fef9c3;color:#854d0e;}
.b-rejected{background:#fee2e2;color:#991b1b;} .b-noresponse{background:#f1f5f9;color:#64748b;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;border:1px solid;}
.tag-blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;} .tag-blue:hover{background:#dbeafe;}
.tag-green{background:#f0fdf4;border-color:#bbf7d0;color:#166534;margin-left:4px;} .tag-green:hover{background:#dcfce7;}
.jd-cell{max-width:220px;font-size:11px;color:var(--muted);cursor:pointer;}
.jd-cell p{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;}
.jd-cell p:hover{color:var(--dark);}
.rounds-col{font-size:11px;min-width:160px;}
.rd{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-s{background:#93c5fd;} .dot-d{background:#86efac;} .dot-p{background:#4ade80;} .dot-r{background:#fca5a5;}
.notes-td{max-width:160px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acts{display:flex;gap:4px;}
.ib{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;color:var(--muted);font-size:13px;font-family:inherit;}
.ib:hover{background:var(--row);color:var(--dark);}
.empty{text-align:center;padding:48px;color:var(--muted);}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;}
.modal{background:#fff;border-radius:14px;padding:26px;width:min(640px,100%);box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h2{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:18px;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;color:var(--dark);font-family:inherit;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,117,182,.1);}
.field textarea{resize:vertical;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0;}
.rr{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.rr input{flex:2;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;}
.rr select{font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:inherit;}
.rr input[type=date]{flex:1;min-width:110px;}
.add-rnd{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
.add-rnd:hover{text-decoration:underline;}
/* PDF modal */
.pdf-ov{position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.pdf-box{background:#fff;border-radius:14px;width:min(960px,96vw);height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.4);}
.pdf-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.pdf-head span{font-size:13px;font-weight:600;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pdf-head div{display:flex;gap:8px;flex-shrink:0;}
iframe#pframe{flex:1;border:none;width:100%;}
/* JD modal */
.jd-ov{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.jd-box{background:#fff;border-radius:14px;width:min(680px,96vw);max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
.jd-box-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.jd-box-head span{font-size:14px;font-weight:700;color:var(--blue);}
.jd-body{padding:20px;overflow-y:auto;font-size:13px;line-height:1.7;color:var(--dark);white-space:pre-wrap;}
</style>
</head>
<body>
<div class="topbar">
  <h1>&#128188; Job Application Tracker &mdash; Nitin</h1>
  <span id="topdate"></span>
</div>
<div class="page">
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <input type="text" id="srch" placeholder="Search role or company..." oninput="render()">
    <select id="fSt" onchange="render()">
      <option value="">All statuses</option>
      <option>Saved</option><option>Applied</option><option>Interview</option>
      <option>Offer</option><option>Rejected</option><option>No response</option>
    </select>
    <select id="srt" onchange="render()">
      <option value="dd">Newest first</option>
      <option value="da">Oldest first</option>
      <option value="co">Company A&ndash;Z</option>
    </select>
    <button class="btn btn-primary" onclick="openAdd()">+ Add application</button>
  </div>
  <div class="wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Role</th><th>Company</th><th>Status</th>
        <th>Date applied</th><th>Salary</th><th>Resume version</th>
        <th>Resume PDF</th><th>Job description</th>
        <th>Interview rounds</th><th>Notes</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">No applications yet &mdash; click <strong>+ Add application</strong> to get started.</div>
  </div>
</div>

<!-- Add/Edit modal -->
<div class="ov" id="ov" style="display:none" onclick="if(event.target===this)closeM()">
<div class="modal">
  <h2 id="mtitle">Add application</h2>
  <div class="r2">
    <div class="field"><label>Job title *</label><input id="ft"></div>
    <div class="field"><label>Company *</label><input id="fc"></div>
  </div>
  <div class="r3">
    <div class="field"><label>Location</label><input id="fl"></div>
    <div class="field"><label>Salary</label><input id="fsal"></div>
    <div class="field"><label>Date applied</label><input type="date" id="fd"></div>
  </div>
  <div class="r2">
    <div class="field"><label>Status</label>
      <select id="fst">
        <option>Saved</option><option>Applied</option><option>Interview</option>
        <option>Offer</option><option>Rejected</option><option>No response</option>
      </select>
    </div>
    <div class="field"><label>Job link URL</label><input id="flk" placeholder="https://..."></div>
  </div>
  <div class="field"><label>Resume version label</label><input id="frv" placeholder="e.g. v5 &ndash; Cohere tailored"></div>
  <div class="field">
    <label>Resume PDF file</label>
    <div id="fup"></div>
  </div>
  <div class="field"><label>Job description</label><textarea id="fjd" rows="4" placeholder="Paste the full JD here..."></textarea></div>
  <hr class="sep">
  <div class="field">
    <label>Interview rounds</label>
    <div id="rcon"></div>
    <button class="add-rnd" onclick="addRnd()">+ Add round</button>
  </div>
  <div class="field"><label>Notes</label><textarea id="fnt" rows="2" placeholder="Key contacts, deadlines, impressions..."></textarea></div>
  <div class="mf">
    <button class="btn" onclick="closeM()">Cancel</button>
    <button class="btn btn-primary" onclick="saveE()">Save application</button>
  </div>
</div>
</div>

<!-- PDF preview modal -->
<div class="pdf-ov" id="pdfOv" style="display:none">
  <div class="pdf-box">
    <div class="pdf-head">
      <span id="pdfTitle"></span>
      <div>
        <button class="btn btn-primary btn-sm" id="pdfDlBtn">&#8595; Download</button>
        <button class="btn btn-sm" onclick="closePDF()">&#10005; Close</button>
      </div>
    </div>
    <iframe id="pframe" src=""></iframe>
  </div>
</div>

<!-- JD modal -->
<div class="jd-ov" id="jdOv" style="display:none" onclick="if(event.target===this)closeJD()">
  <div class="jd-box">
    <div class="jd-box-head">
      <span id="jdTitle">Job Description</span>
      <button class="btn btn-sm" onclick="closeJD()">&#10005; Close</button>
    </div>
    <div class="jd-body" id="jdBody"></div>
  </div>
</div>

let apps=[], ei=null, afn=null, afd=null;

function load(){
  try{
    const r=localStorage.getItem('njt_v4');
    apps = r ? JSON.parse(r) : JSON.parse(JSON.stringify(SEED));
    if(!r) save();
  }catch(e){ apps=JSON.parse(JSON.stringify(SEED)); }
  render();
}

function save(){
  try{ localStorage.setItem('njt_v4', JSON.stringify(apps)); }catch(e){}
}

function sc(s){ return ({Applied:'b-applied',Interview:'b-interview',Offer:'b-offer',Rejected:'b-rejected',Saved:'b-saved','No response':'b-noresponse'})[s]||'b-saved'; }
function dc(s){ return ({Scheduled:'dot-s',Done:'dot-d',Passed:'dot-p',Rejected:'dot-r'})[s]||'dot-s'; }

function renderStats(){
  const c={Applied:0,Interview:0,Offer:0,Rejected:0};
  apps.forEach(a=>{ if(c[a.status]!==undefined) c[a.status]++; });
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${apps.length}</div></div>
    <div class="stat"><div class="stat-lbl">Applied</div><div class="stat-val">${c.Applied}</div></div>
    <div class="stat"><div class="stat-lbl">Interviews</div><div class="stat-val">${c.Interview}</div></div>
    <div class="stat"><div class="stat-lbl">Offers</div><div class="stat-val">${c.Offer}</div></div>
    <div class="stat"><div class="stat-lbl">Rejected</div><div class="stat-val">${c.Rejected}</div></div>`;
}

function render(){
  renderStats();
  const q=document.getElementById('srch').value.toLowerCase();
  const fs=document.getElementById('fSt').value;
  const srt=document.getElementById('srt').value;
  let list=apps.map((a,i)=>(({...a,_i:i})));
  if(q) list=list.filter(a=>(a.title+a.company).toLowerCase().includes(q));
  if(fs) list=list.filter(a=>a.status===fs);
  if(srt==='da') list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  else if(srt==='dd') list.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  else list.sort((a,b)=>a.company.localeCompare(b.company));

  const tbody=document.getElementById('tbody');
  document.getElementById('empty').style.display=list.length?'none':'block';
  if(!list.length){tbody.innerHTML='';return;}

  tbody.innerHTML=list.map((a,n)=>{
    const rounds=(a.rounds||[]).map(r=>`<div class="rd"><div class="dot ${dc(r.status)}"></div><span>${r.name}</span>${r.date?`<span style="color:var(--muted);font-size:10px"> &middot; ${r.date}</span>`:''}</div>`).join('');

    const pdfBtns = a.fileData
      ? `<span class="tag tag-blue" onclick="previewPDF(${a._i})">&#128065; Preview</span><span class="tag tag-green" onclick="dlPDF(${a._i})">&#8595; PDF</span>`
      : `<span style="color:var(--muted);font-size:12px">&mdash;</span>`;

    const jdBtn = a.jd
      ? `<div class="jd-cell" onclick="showJD(${a._i})"><p>${a.jd.replace(/</g,'&lt;').slice(0,180)}...</p><span style="color:var(--accent);font-size:10px;margin-top:3px;display:block">View full JD &rarr;</span></div>`
      : `<span style="color:var(--muted);font-size:12px">&mdash;</span>`;

    return `<tr>
      <td style="color:var(--muted);font-size:12px">${n+1}</td>
      <td><strong style="font-size:13px">${a.title}</strong>${a.link?`<a href="${a.link}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;margin-left:4px">&#8599;</a>`:''}</td>
      <td><span style="font-size:13px">${a.company}</span><small style="display:block;font-size:11px;color:var(--muted)">${a.location||''}</small></td>
      <td><span class="badge ${sc(a.status)}">${a.status}</span></td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${a.date||'&mdash;'}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${a.salary||'&mdash;'}</td>
      <td style="font-size:12px;color:var(--muted)">${a.resume||'&mdash;'}</td>
      <td>${pdfBtns}</td>
      <td>${jdBtn}</td>
      <td class="rounds-col">${rounds||'<span style="color:var(--muted)">&mdash;</span>'}</td>
      <td class="notes-td" title="${(a.notes||'').replace(/"/g,'&quot;')}">${a.notes||'&mdash;'}</td>
      <td><div class="acts">
        <button class="ib" title="Edit" onclick="openEdit(${a._i})">&#9998;</button>
        <button class="ib" title="Delete" onclick="del(${a._i})">&#10005;</button>
      </div></td>
    </tr>`;
  }).join('');
}

function resetUp(){
  document.getElementById('fup').innerHTML=`<div style="border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;position:relative;cursor:pointer;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
    <input type="file" accept=".pdf,.doc,.docx" onchange="handleF(this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
    <p style="font-size:12px;color:var(--muted)">Drop file or <strong style="color:var(--accent)">browse</strong> &mdash; PDF or .docx</p>
  </div>`;
}
function showChip(name){
  document.getElementById('fup').innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;">
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1d4ed8">&#128196; ${name}</span>
    <button onclick="clearF()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;">&#10005;</button>
  </div>`;
}
function clearF(){ afn=null;afd=null;resetUp(); }
function handleF(inp){
  const file=inp.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{ afd=e.target.result; afn=file.name; showChip(file.name); };
  r.readAsDataURL(file);
}

function openAdd(){
  ei=null; afn=null; afd=null;
  document.getElementById('mtitle').textContent='Add application';
  ['ft','fc','fl','fsal','frv','flk','fnt','fjd'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fst').value='Applied';
  document.getElementById('fd').value=new Date().toISOString().slice(0,10);
  resetUp();
  document.getElementById('rcon').innerHTML='';
  document.getElementById('ov').style.display='flex';
}

function openEdit(i){
  ei=i; const a=apps[i];
  document.getElementById('mtitle').textContent='Edit application';
  document.getElementById('ft').value=a.title||'';
  document.getElementById('fc').value=a.company||'';
  document.getElementById('fl').value=a.location||'';
  document.getElementById('fsal').value=a.salary||'';
  document.getElementById('fd').value=a.date||'';
  document.getElementById('fst').value=a.status||'Applied';
  document.getElementById('frv').value=a.resume||'';
  document.getElementById('flk').value=a.link||'';
  document.getElementById('fjd').value=a.jd||'';
  document.getElementById('fnt').value=a.notes||'';
  afn=a.fileName||null; afd=a.fileData||null;
  if(afn) showChip(afn); else resetUp();
  const rc=document.getElementById('rcon'); rc.innerHTML='';
  (a.rounds||[]).forEach(r=>addRnd(r.name,r.status,r.date));
  document.getElementById('ov').style.display='flex';
}

function closeM(){ document.getElementById('ov').style.display='none'; }

function addRnd(name='',status='Scheduled',date=''){
  const d=document.createElement('div'); d.className='rr';
  d.innerHTML=`<input type="text" placeholder="e.g. Talent Advisor screen" value="${name}">
    <select>
      <option ${status==='Scheduled'?'selected':''}>Scheduled</option>
      <option ${status==='Done'?'selected':''}>Done</option>
      <option ${status==='Passed'?'selected':''}>Passed</option>
      <option ${status==='Rejected'?'selected':''}>Rejected</option>
    </select>
    <input type="date" value="${date}">
    <button class="ib" onclick="this.parentElement.remove()">&#10005;</button>`;
  document.getElementById('rcon').appendChild(d);
}

function getRnds(){
  return Array.from(document.getElementById('rcon').querySelectorAll('.rr')).map(row=>{
    const ins=row.querySelectorAll('input'); const sel=row.querySelector('select');
    return {name:ins[0].value.trim(),status:sel.value,date:ins[1].value};
  }).filter(r=>r.name);
}

function saveE(){
  const title=document.getElementById('ft').value.trim();
  const company=document.getElementById('fc').value.trim();
  if(!title||!company){alert('Role and company are required.');return;}
  const entry={
    title,company,
    location:document.getElementById('fl').value.trim(),
    salary:document.getElementById('fsal').value.trim(),
    date:document.getElementById('fd').value,
    status:document.getElementById('fst').value,
    resume:document.getElementById('frv').value.trim(),
    link:document.getElementById('flk').value.trim(),
    jd:document.getElementById('fjd').value.trim(),
    notes:document.getElementById('fnt').value.trim(),
    rounds:getRnds(),
    fileName:afn||null,
    fileData:afd||null,
  };
  if(ei!==null) apps[ei]=entry; else apps.unshift(entry);
  save(); closeM(); render();
}

function del(i){
  if(!confirm('Delete this application?')) return;
  apps.splice(i,1); save(); render();
}

function previewPDF(i){
  const a=apps[i]; if(!a.fileData) return;
  document.getElementById('pdfTitle').textContent=a.fileName;
  document.getElementById('pframe').src=a.fileData;
  document.getElementById('pdfDlBtn').onclick=()=>dlPDF(i);
  document.getElementById('pdfOv').style.display='flex';
}
function closePDF(){ document.getElementById('pdfOv').style.display='none'; document.getElementById('pframe').src=''; }
function dlPDF(i){ const a=apps[i];if(!a.fileData)return;const l=document.createElement('a');l.href=a.fileData;l.download=a.fileName;l.click(); }

function showJD(i){
  const a=apps[i]; if(!a.jd) return;
  document.getElementById('jdTitle').textContent=a.title+' — '+a.company;
  document.getElementById('jdBody').textContent=a.jd;
  document.getElementById('jdOv').style.display='flex';
}
function closeJD(){ document.getElementById('jdOv').style.display='none'; }

load();
</script>
</body>
</html>
